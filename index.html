<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Ramnad Site Management v1.0</title>

<link rel="stylesheet" href="style.css">

<!-- Leaflet -->
<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<!-- Awesome Icons -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

</head>

<body>

<!-- ========================= -->
<!-- Sidebar -->
<!-- ========================= -->

<div id="sidebar">

<div class="sidebar-header">

<div class="logo">

<i class="fa-solid fa-location-dot"></i>

<div>

<h2>Ramnad Sites</h2>

<p>Site Management v1.0</p>

</div>

</div>

<button id="closeSidebar">

<i class="fa-solid fa-xmark"></i>

</button>

</div>


<!-- Search -->

<div class="search-container">

<input
type="text"
id="searchInput"
placeholder="Search Site / Village">

<i class="fa-solid fa-magnifying-glass"></i>

</div>

<!-- Site Count -->

<div id="siteCount">

Loading Sites...

</div>

<!-- Site List -->

<div id="siteList">

</div>

</div>



<!-- ========================= -->
<!-- Map -->
<!-- ========================= -->

<div id="map"></div>

<!-- Sidebar Open -->

<button id="menuButton">

<i class="fa-solid fa-bars"></i>

</button>

<!-- Floating Buttons -->

<div id="floatingButtons">

<button id="locateBtn">

<i class="fa-solid fa-location-crosshairs"></i>

</button>

<button id="measureBtn">

<i class="fa-solid fa-ruler"></i>

</button>

<button id="resetBtn">

<i class="fa-solid fa-rotate-left"></i>

</button>

</div>

<!-- Bottom Info Card -->

<div id="infoCard">

<div id="infoTitle">

Select a Site

</div>

<div id="infoBody">

Click any marker to view details.

</div>

</div>

<!-- Leaflet -->

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<script src="script.js"></script>

</body>

</html>
